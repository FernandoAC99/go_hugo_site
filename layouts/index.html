    }

    body {

    }

    a {

    .topbar {
      position: sticky;

      border-bottom: 1px solid rgba(255, 255, 255, .06);
    }

    .topbar .row {
      display: flex;

    .brand {

    }

    .logo {

    }

    .nav {
      display: flex;

    }

    .pill {

      background: rgba(255, 255, 255, .06);

    .pill:hover {

    .pill.active {
      color: var(--text);

    }

    .spacer {
      flex: 1
    }

    .search {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;

      background: rgba(255, 255, 255, .06);
      border: 1px solid rgba(255, 255, 255, .10);
      min-width: 260px;
    }

    .search input {
      all: unset;
      flex: 1;
      color: var(--text);
    }

    .btn {
      border: 0;
      cursor: pointer;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .10);
      color: var(--text);
      transition: .15s transform, .15s background;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, .09)
    }

    .btn.primary {
      background: linear-gradient(135deg, rgba(110, 231, 255, .20), rgba(167, 139, 250, .20));
      border-color: rgba(110, 231, 255, .25);
    }

    .badge {
      min-width: 22px;
      height: 22px;
      border-radius: 999px;
      background: rgba(110, 231, 255, .20);
      border: 1px solid rgba(110, 231, 255, .25);

      place-items: center;
      font-weight: 700;
      font-size: 12px;
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
      align-items: start;
      margin-top: 16px;
    }

    @media(max-width: 980px) {
      .layout {
        grid-template-columns: 1fr
      }

      .search {
        min-width: 0;
        width: 100%;
      }

      .nav {
        display: none

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, .06), rgba(255, 255, 255, .03));

    .muted {

    }

    .section {
      padding: 12px;

      background: rgba(0, 0, 0, .12);
      border: 1px solid rgba(255, 255, 255, .07)
    }

    .section+.section {
      margin-top: 10px

    .field {
      display: flex;

    .field select,
    .field input[type="range"] {
      width: 100%;

      border: 1px solid rgba(255, 255, 255, .10);
      color: var(--text);
      padding: 10px 10px;
      border-radius: 12px;
      outline: none;
    }

    .row2 {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap
    }

    .grid {
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    @media(max-width: 1100px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media(max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }

    .product {
      border-radius: 16px;
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .10);
      overflow: hidden;
      transition: .15s transform, .15s border, .15s background;

    }

    .product:hover {
      transform: translateY(-2px);

    }

    .thumb {
      height: 130px;

    }

    .tag {
      position: absolute;

    }

    .body {

    }

    .title {

    }

    .btn.warn {

    }

    .btn.bad {
      border-color: rgba(251, 113, 133, .35);
      background: rgba(251, 113, 133, .12)
    }

    .toolbar {
      padding: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .pager {
      display: flex;
      gap: 8px;
      align-items: center
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: rgba(18, 27, 47, .92);
      border: 1px solid rgba(255, 255, 255, .10);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .4);
      max-width: 340px;
      display: none;
      z-index: 50;
    }

    .toast.show {
      display: block
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      width: 380px;
      background: rgba(15, 23, 48, .92);
      border-left: 1px solid rgba(255, 255, 255, .10);
      backdrop-filter: blur(12px);
      transform: translateX(100%);
      transition: .2s transform;
      z-index: 60;
      display: flex;
      flex-direction: column;
    }

    .drawer.open {
      transform: translateX(0)
    }

    .drawer header {
      padding: 14px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .cartItems {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: auto
    }

    .cartItem {
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .10);
      background: rgba(255, 255, 255, .05);
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .cartFooter {
      padding: 14px;
      border-top: 1px solid rgba(255, 255, 255, .08);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .kpi {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px
    }

    .kpi .box {
      flex: 1;
      min-width: 120px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(0, 0, 0, .12);
      border: 1px solid rgba(255, 255, 255, .07)
    }

    .box .n {
      font-size: 18px;
      font-weight: 900
    }

    .box .l {
      color: var(--muted);
      font-size: 12px
    }
  </style>

<body>
  <div class="topbar">
    <div class="row">
      <a class="brand" href="/catalogo/">
        <span class="logo"></span>
        <span>Datadog Shop</span>
      </a>

      <nav class="nav" aria-label="Navegación">
        <button class="pill active" data-nav="home">Inicio</button>
        <button class="pill" data-nav="ofertas">Ofertas</button>
        <button class="pill" data-nav="novedades">Novedades</button>
        <button class="pill" data-nav="soporte">Soporte</button>
      </nav>

      <div class="spacer"></div>

      <div class="search" role="search">
        <span class="muted">🔎</span>
        <input id="q" placeholder="Buscar producto..." autocomplete="off" />
      </div>

      <button id="btnCart" class="btn primary" type="button">
        🛒 Carrito <span id="cartCount" class="badge">0</span>
      </button>

      <button id="btnProfile" class="btn" type="button">👤 Perfil</button>
    </div>
  </div>

  <div class="wrap">
    <div class="layout">
      <aside class="card side">
        <div class="section">
          <h3>Filtros</h3>
          <p class="muted" style="margin:6px 0 0">Úsalos para generar eventos de interacción (RUM).</p>

          <div class="field">
            <label>Categoría</label>
            <select id="category">
              <option value="all">Todas</option>
              <option value="audio">Audio</option>
              <option value="hogar">Hogar</option>
              <option value="gaming">Gaming</option>
              <option value="cafe">Café</option>
            </select>
          </div>

          <div class="field">
            <label>Ordenar por</label>
            <select id="sort">
              <option value="relevance">Relevancia</option>
              <option value="price_asc">Precio: menor a mayor</option>
              <option value="price_desc">Precio: mayor a menor</option>
              <option value="rating">Mejor calificados</option>
            </select>
          </div>

          <div class="field">
            <label>Precio máximo: <span id="priceMaxLbl" class="muted">$2500</span></label>
            <input id="priceMax" type="range" min="200" max="5000" step="100" value="2500" />
          </div>

          <div class="kpi">
            <div class="box">
              <div class="n" id="kpiShown">0</div>
              <div class="l">Mostrados</div>
            </div>
            <div class="box">
              <div class="n" id="kpiCart">0</div>
              <div class="l">En carrito</div>
            </div>
          </div>

          <div class="row2" style="margin-top:12px">
            <button id="btnApply" class="btn ok" type="button">✅ Aplicar</button>
            <button id="btnReset" class="btn" type="button">↩️ Reset</button>
          </div>
        </div>

        <div class="section">
          <h3>Acciones para “romper cosas”</h3>
          <p class="muted" style="margin:6px 0 10px">
            Estos botones te ayudan a generar errores / latencia / acciones custom.
          </p>
          <div class="row2">
            <button id="btnSlow" class="btn warn small" type="button">🐢 Simular latencia</button>
            <button id="btnErr" class="btn bad small" type="button">💥 Lanzar error</button>
            <button id="btnFetch" class="btn small" type="button">🌐 Fake fetch</button>
          </div>
        </div>
      </aside>

      <main class="card">
        <div class="toolbar">
          <div>
            <h3 style="margin:0">Catálogo</h3>
            <div class="muted" id="subtitle">Explora, filtra y agrega al carrito.</div>
          </div>
          <div class="pager">
            <button id="prev" class="btn small" type="button">⬅️</button>
            <span class="muted" id="pageLbl">Página 1</span>
            <button id="next" class="btn small" type="button">➡️</button>
          </div>
        </div>

        <div id="grid" class="grid"></div>
      </main>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="drawer" class="drawer" aria-hidden="true">
    <header>
      <strong>🛒 Tu carrito</strong>
      <button id="btnCloseCart" class="btn small" type="button">Cerrar</button>
    </header>
    <div id="cartItems" class="cartItems"></div>
    <div class="cartFooter">
      <div class="row2" style="justify-content:space-between">
        <span class="muted">Total a pagar</span>
        <strong id="cartTotal">$0</strong>
      </div>
      <button id="btnCheckout" class="btn primary" type="button">Pagar</button>
      <button id="btnClear" class="btn" type="button">Vaciar carrito</button>
    </div>
  </div>

  <script>
    // --- Datos fake
    const products = [
      { id: "p1", name: "JBL Party Boom", cat: "audio", price: 1499, rating: 4.6, tag: "Audio" },
      { id: "p2", name: "Teclado Mecánico", cat: "gaming", price: 2199, rating: 4.8, tag: "Gaming" },
      { id: "p3", name: "Cafetera Olla Pro", cat: "cafe", price: 899, rating: 4.3, tag: "Café" },
      { id: "p4", name: "Taza Térmica Steel", cat: "cafe", price: 399, rating: 4.1, tag: "Café" },
      { id: "p5", name: "Lámpara Minimal Glow", cat: "hogar", price: 799, rating: 4.4, tag: "Hogar" },
      { id: "p6", name: "Mouse UltraLite", cat: "gaming", price: 999, rating: 4.7, tag: "Gaming" },
      { id: "p7", name: "Barra de Sonido Slim", cat: "audio", price: 2499, rating: 4.2, tag: "Audio" },
      { id: "p8", name: "Organizador Desk Pro", cat: "hogar", price: 599, rating: 4.0, tag: "Hogar" },
      { id: "p9", name: "Audífonos Studio Air", cat: "audio", price: 1999, rating: 4.5, tag: "Audio" },
      { id: "p10", name: "Espumador de Leche", cat: "cafe", price: 499, rating: 4.2, tag: "Café" },
      { id: "p11", name: "Silla Gamer Chill", cat: "gaming", price: 3999, rating: 4.6, tag: "Gaming" },
      { id: "p12", name: "Difusor Aroma Zen", cat: "hogar", price: 699, rating: 4.3, tag: "Hogar" },
    ];

    // --- Estado
    const state = {
      q: "",
      category: "all",
      sort: "relevance",
      priceMax: 2500,
      page: 1,
      perPage: 6,
      cart: new Map(), // id -> qty
    };

    // --- Helpers
    const $ = (id) => document.getElementById(id);
    const money = (n) => "$" + n.toLocaleString("es-MX");
    function toast(msg) {
      const el = $("toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 1400);
    }

    // --- RUM helper opcional (si lo tienes inicializado)
    function rumAction(name, ctx) {
      try {
        if (window.DD_RUM && typeof window.DD_RUM.addAction === "function") {
          window.DD_RUM.addAction(name, ctx || {});
        }
      } catch (e) { }
    }

    function applyFilters(list) {
      let out = [...list];

      if (state.q.trim()) {
        const q = state.q.toLowerCase();
        out = out.filter(p => p.name.toLowerCase().includes(q));
      }
      if (state.category !== "all") {
        out = out.filter(p => p.cat === state.category);
      }
      out = out.filter(p => p.price <= state.priceMax);

      if (state.sort === "price_asc") out.sort((a, b) => a.price - b.price);
      if (state.sort === "price_desc") out.sort((a, b) => b.price - a.price);
      if (state.sort === "rating") out.sort((a, b) => b.rating - a.rating);

      return out;
    }

    function render() {
      const filtered = applyFilters(products);
      const totalPages = Math.max(1, Math.ceil(filtered.length / state.perPage));
      if (state.page > totalPages) state.page = totalPages;

      const start = (state.page - 1) * state.perPage;
      const pageItems = filtered.slice(start, start + state.perPage);

      $("grid").innerHTML = pageItems.map(p => `
        <article class="product" data-id="${p.id}">
          <div class="thumb">
            <span class="tag">${p.tag}</span>
          </div>
          <div class="body">
            <div class="title">${p.name}</div>
            <div class="muted">⭐ ${p.rating} • categoría: ${p.cat}</div>
            <div class="price">${money(p.price)} <small>MXN</small></div>
            <div class="actions">
              <button class="btn small ok" data-act="add">Agregar</button>
              <button class="btn small" data-act="details">Detalles</button>
              <button class="btn small warn" data-act="wishlist">Wishlist</button>
            </div>
          </div>
        </article>
      `).join("");

      $("pageLbl").textContent = `Página ${state.page} de ${totalPages}`;
      $("kpiShown").textContent = filtered.length.toString();
      $("kpiCart").textContent = totalCartQty().toString();
      $("cartCount").textContent = totalCartQty().toString();

      // enable/disable pager
      $("prev").disabled = state.page <= 1;
      $("next").disabled = state.page >= totalPages;
    }

    function totalCartQty() {
      let n = 0;
      for (const qty of state.cart.values()) n += qty;
      return n;
    }
    function cartTotal() {
      let total = 0;
      for (const [id, qty] of state.cart.entries()) {
        const p = products.find(x => x.id === id);
        if (p) total += p.price * qty;
      }
      return total;
    }

    function openCart() {
      $("drawer").classList.add("open");
      $("drawer").setAttribute("aria-hidden", "false");
      renderCart();
      rumAction("open_cart");
    }
    function closeCart() {
      $("drawer").classList.remove("open");
      $("drawer").setAttribute("aria-hidden", "true");
      rumAction("close_cart");
    }
    function renderCart() {
      const items = [...state.cart.entries()].map(([id, qty]) => {
        const p = products.find(x => x.id === id);
        if (!p) return "";
        return `
          <div class="cartItem">
            <div>
              <div style="font-weight:800">${p.name}</div>
              <div class="muted">${money(p.price)} • qty ${qty}</div>
            </div>
            <div class="row2">
              <button class="btn small" data-cart="dec" data-id="${id}">-</button>
              <button class="btn small" data-cart="inc" data-id="${id}">+</button>
              <button class="btn small bad" data-cart="rm" data-id="${id}">x</button>
            </div>
          </div>
        `;
      }).join("");

      $("cartItems").innerHTML = items || `<div class="muted">Tu carrito está vacío. Agrega algo 😄</div>`;
      $("cartTotal").textContent = money(cartTotal());
      $("kpiCart").textContent = totalCartQty().toString();
      $("cartCount").textContent = totalCartQty().toString();
    }

    // --- Eventos UI (mucho “que picarle”)
    // top nav
    document.querySelectorAll("[data-nav]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll("[data-nav]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        toast(`Navegaste a: ${btn.dataset.nav}`);
        // simula navegación SPA cambiando hash
        location.hash = btn.dataset.nav;
        rumAction("nav_click", { section: btn.dataset.nav });
      });
    });

    // search
    $("q").addEventListener("input", (e) => {
      state.q = e.target.value;
      state.page = 1;
      render();
      rumAction("search", { q: state.q });
    });

    // filters
    $("category").addEventListener("change", (e) => { state.category = e.target.value; rumAction("filter_category", { value: state.category }); });
    $("sort").addEventListener("change", (e) => { state.sort = e.target.value; rumAction("sort_change", { value: state.sort }); });
    $("priceMax").addEventListener("input", (e) => {
      state.priceMax = Number(e.target.value);
      $("priceMaxLbl").textContent = money(state.priceMax);
      rumAction("price_slider", { max: state.priceMax });
    });

    $("btnApply").addEventListener("click", () => {
      state.page = 1;
      render();
      toast("Filtros aplicados");
      rumAction("apply_filters", { category: state.category, sort: state.sort, priceMax: state.priceMax });
    });

    $("btnReset").addEventListener("click", () => {
      state.q = ""; $("q").value = "";
      state.category = "all"; $("category").value = "all";
      state.sort = "relevance"; $("sort").value = "relevance";
      state.priceMax = 2500; $("priceMax").value = "2500"; $("priceMaxLbl").textContent = money(2500);
      state.page = 1;
      render();
      toast("Reset ✅");
      rumAction("reset_filters");
    });

    // pager
    $("prev").addEventListener("click", () => { state.page--; render(); rumAction("page_prev", { page: state.page }); });
    $("next").addEventListener("click", () => { state.page++; render(); rumAction("page_next", { page: state.page }); });

    // product actions (delegation)
    $("grid").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-act]");
      if (!btn) return;
      const card = e.target.closest(".product");
      const id = card?.dataset.id;
      const p = products.find(x => x.id === id);
      if (!p) return;

      const act = btn.dataset.act;

      if (act === "add") {
        state.cart.set(id, (state.cart.get(id) || 0) + 1);
        render();
        toast(`Agregado: ${p.name}`);
        rumAction("add_to_cart", { productId: id, name: p.name, price: p.price, category: p.cat });
      }

      if (act === "details") {
        // simula una navegación a "detalle" (sin crear página real)
        toast(`Detalles: ${p.name}`);
        history.pushState({ productId: id }, "", `?product=${encodeURIComponent(id)}`);
        rumAction("view_details", { productId: id, name: p.name });
      }

      if (act === "wishlist") {
        toast(`Wishlist: ${p.name}`);
        rumAction("add_to_wishlist", { productId: id, name: p.name });
      }
    });

    // cart drawer
    $("btnCart").addEventListener("click", openCart);
    $("btnCloseCart").addEventListener("click", closeCart);

    $("cartItems").addEventListener("click", (e) => {
      const b = e.target.closest("button[data-cart]");
      if (!b) return;
      const id = b.dataset.id;
      const mode = b.dataset.cart;
      const qty = state.cart.get(id) || 0;

      if (mode === "inc") state.cart.set(id, qty + 1);
      if (mode === "dec") (qty <= 1) ? state.cart.delete(id) : state.cart.set(id, qty - 1);
      if (mode === "rm") state.cart.delete(id);

      renderCart();
      render();
      rumAction("cart_update", { productId: id, mode, qty: state.cart.get(id) || 0 });
    });

    $("btnClear").addEventListener("click", () => {
      state.cart.clear();
      renderCart(); render();
      toast("Carrito vacío");
      rumAction("cart_clear");
    });

    $("btnCheckout").addEventListener("click", () => {
      toast("Checkout (fake) 🧾");
      rumAction("checkout_click", { total: cartTotal(), items: totalCartQty() });
      openCart(); // deja abierto para que veas cambios
    });

    $("btnProfile").addEventListener("click", () => {
      toast("Perfil (fake)");
      rumAction("open_profile");
    });

    // chaos buttons
    $("btnSlow").addEventListener("click", async () => {
      rumAction("simulate_latency_start");
      toast("Simulando latencia...");
      await new Promise(r => setTimeout(r, 1600));
      toast("Listo (latencia simulada)");
      rumAction("simulate_latency_done", { ms: 1600 });
    });

    $("btnErr").addEventListener("click", () => {
      rumAction("throw_error_click");
      // Esto debe generar un error JS visible (y RUM lo debería capturar si está activo)
      throw new Error("💥 Error simulado para RUM (JS exception)");
    });

    $("btnFetch").addEventListener("click", async () => {
      rumAction("fake_fetch_click");
      // Fake fetch (success/fail random) para ver resource/error tracking
      const ok = Math.random() > 0.35;
      toast("Haciendo request fake...");
      await new Promise(r => setTimeout(r, 600));

      if (!ok) {
        toast("Request falló (fake)");
        // disparamos un error “tipo fetch”
        Promise.reject(new Error("Fake network error")).catch(() => { });
        rumAction("fake_fetch_fail");
        return;
      }
      toast("Request OK (fake)");
      rumAction("fake_fetch_ok");
    });

    // init
    $("priceMaxLbl").textContent = money(state.priceMax);
    render();
  </script>
</body>

</html>
